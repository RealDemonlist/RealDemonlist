<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Demonlist | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08080a;
            --surface-color: #12121a;
            --surface-hover: #1a1a26;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #ffffff;
            --text-muted: #8e8e9e;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background-color: rgba(8, 8, 10, 0.8);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: var(--transition); }
        .logo:hover { color: var(--accent-color); text-shadow: 0 0 15px var(--accent-glow); }

        .nav-btn { 
            background: var(--accent-color); color: white; border: none; 
            padding: 10px 24px; border-radius: 10px; font-weight: 700; 
            cursor: pointer; transition: var(--transition);
        }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--accent-glow); }

        .user-badge { 
            background: rgba(255, 255, 255, 0.05); padding: 8px 18px; 
            border-radius: 10px; cursor: pointer; font-weight: 600; 
            border: 1px solid rgba(255, 255, 255, 0.1); transition: var(--transition);
        }
        .user-badge:hover { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }

        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; animation: fadeIn 0.6s ease-out forwards; }

        .tabs { display: flex; gap: 25px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .tab { cursor: pointer; color: var(--text-muted); font-weight: 700; font-size: 18px; transition: var(--transition); position: relative; }
        .tab.active { color: var(--accent-color); }
        .tab.active::after { content: ''; position: absolute; bottom: -16px; left: 0; width: 100%; height: 3px; background: var(--accent-color); border-radius: 2px; }

        .level-card, .player-card {
            background-color: var(--surface-color); border-radius: var(--border-radius);
            padding: 20px; display: flex; align-items: center; gap: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer;
            transition: var(--transition); margin-bottom: 15px;
        }
        .level-card:hover, .player-card:hover { transform: translateX(10px) scale(1.02); background-color: var(--surface-hover); border-color: var(--accent-color); }

        .level-img { width: 160px; height: 90px; border-radius: 12px; background-size: cover; background-position: center; background-color: #1c1c28; flex-shrink: 0; }
        
        .victors-box { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 18px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .victor-tag { display: inline-block; background: rgba(59, 130, 246, 0.15); color: var(--accent-color); padding: 6px 14px; border-radius: 20px; font-size: 13px; margin: 5px; font-weight: 700; border: 1px solid rgba(59, 130, 246, 0.3); }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .video-container iframe { width: 100%; height: 100%; border: none; }

        .like-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 12px 28px; border-radius: 12px; cursor: pointer;
            font-weight: 700; transition: var(--transition); display: flex; align-items: center; gap: 10px;
        }
        .like-btn.active { background: #ef4444; border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        .card {
            background-color: var(--surface-color); padding: 40px; border-radius: 24px;
            width: 100%; max-width: 450px; margin: 60px auto; border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .input-field { width: 100%; padding: 16px; margin: 10px 0 20px; background: var(--bg-color); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; color: white; outline: none; transition: var(--transition); }
        .input-field:focus { border-color: var(--accent-color); }
        
        .action-btn { width: 100%; padding: 16px; background: var(--accent-color); border: none; border-radius: 14px; color: white; font-weight: 700; cursor: pointer; transition: var(--transition); font-size: 16px; }
        .action-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .hidden { display: none !important; }
        .back-link { cursor: pointer; color: var(--text-muted); display: inline-block; margin-bottom: 20px; font-weight: 600; transition: var(--transition); }
        .back-link:hover { color: white; transform: translateX(-5px); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showPage('home')">Real Demonlist</div>
        <div id="header-auth">
            <button class="nav-btn" onclick="showPage('auth')">Войти</button>
        </div>
    </header>

    <div id="page-home" class="container">
        <div class="tabs">
            <div class="tab active" id="tab-levels" onclick="switchTab('levels')">Уровни</div>
            <div class="tab" id="tab-players" onclick="switchTab('players')">Топ игроков</div>
        </div>

        <div id="section-levels">
            <div id="levels-list"></div>
        </div>

        <div id="section-players" class="hidden">
            <div id="players-list"></div>
        </div>
    </div>

    <div id="page-level-detail" class="container hidden">
        <div class="back-link" onclick="showPage('home')">← Назад к списку</div>
        <div class="video-container" id="video-frame"></div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1 id="det-name" style="font-size: 36px; font-weight: 800;"></h1>
            <button class="like-btn" id="like-btn-action">❤ <span id="det-likes">0</span></button>
        </div>
        <p id="det-author" style="color: var(--text-muted); font-size: 18px; margin-bottom: 30px;"></p>

        <div class="victors-box">
            <h3 style="margin-bottom:15px;">Victors (Прошедшие):</h3>
            <div id="victors-list"></div>
        </div>
    </div>

    <div id="page-auth" class="container hidden">
        <div class="card">
            <h2 id="auth-title" style="text-align: center; margin-bottom: 25px;">Авторизация</h2>
            <input type="text" id="auth-user" class="input-field" placeholder="Никнейм">
            <input type="password" id="auth-pass" class="input-field" placeholder="Пароль">
            <button class="action-btn" onclick="handleAuth()">Продолжить</button>
            <p id="auth-toggle" onclick="toggleAuthMode()" style="text-align: center; margin-top: 20px; cursor: pointer; color: var(--text-muted); font-size: 14px;">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <div id="page-profile" class="container hidden">
        <div class="card" style="text-align: center;">
            <div style="width: 80px; height: 80px; background: var(--accent-color); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 800;" id="user-avatar">?</div>
            <h2 id="profile-name" style="margin-bottom: 30px;">User</h2>
            <button class="action-btn" style="background: #ef4444;" onclick="logout()">Выйти из системы</button>
        </div>
    </div>

    <script>
        // ==========================================
        // НАСТРОЙКИ КОНТЕНТА (РЕДАКТИРУЙ ТУТ)
        // ==========================================
        
        const levels = [
            {
                name: "Bloodbath",
                author: "Riot",
                img: "",
                video: "https://www.youtube.com/watch?v=hheiktJXVds",
                victors: ["GMDdolbaebphy","rcelestial"]
            },
        ];

        const topPlayers = [
            { name: "GMDdolbaebphy", points: 1500 },
            { name: "rcelestial", points: 1450 },
            { name: "rspace21", points: 0 },
            { name: "gdmyasik1", points: 0 }
        ];

        // ==========================================
        // ЛОГИКА ПРИЛОЖЕНИЯ
        // ==========================================

        let currentUser = localStorage.getItem('list_user') || null;
        let isLoginMode = true;

        function showPage(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function switchTab(tab) {
            document.getElementById('section-levels').classList.toggle('hidden', tab !== 'levels');
            document.getElementById('section-players').classList.toggle('hidden', tab !== 'players');
            document.getElementById('tab-levels').classList.toggle('active', tab === 'levels');
            document.getElementById('tab-players').classList.toggle('active', tab === 'players');
        }

        function renderAll() {
            // Рендер уровней
            const lCont = document.getElementById('levels-list');
            lCont.innerHTML = '';
            levels.forEach((l, i) => {
                const likes = JSON.parse(localStorage.getItem(`likes_${i}`)) || 0;
                lCont.innerHTML += `
                    <div class="level-card" onclick="openLevel(${i})">
                        <div class="level-img" style="background-image: url('${l.img}')"></div>
                        <div style="flex-grow:1">
                            <div style="font-weight:800; font-size:20px;">${l.name}</div>
                            <div style="color:var(--text-muted); font-size:14px;">by ${l.author}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:700; color:var(--accent-color)">${l.victors.length} VICTORS</div>
                            <div style="font-size:13px; opacity:0.6; margin-top:5px;">❤ ${likes}</div>
                        </div>
                    </div>`;
            });

            // Рендер топа игроков
            const pCont = document.getElementById('players-list');
            pCont.innerHTML = '';
            topPlayers.sort((a,b) => b.points - a.points).forEach((p, i) => {
                pCont.innerHTML += `
                    <div class="player-card">
                        <div style="font-weight:800; font-size:20px; color:var(--accent-color); width:40px;">#${i+1}</div>
                        <div style="flex-grow:1; font-weight:700; font-size:18px;">${p.name}</div>
                        <div style="font-weight:800; background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:10px;">${p.points} PTS</div>
                    </div>`;
            });
        }

        let activeLvlIdx = null;
        function openLevel(i) {
            activeLvlIdx = i;
            const l = levels[i];
            document.getElementById('det-name').innerText = l.name;
            document.getElementById('det-author').innerText = 'by ' + l.author;
            
            const likes = JSON.parse(localStorage.getItem(`likes_${i}`)) || 0;
            document.getElementById('det-likes').innerText = likes;

            let vid = l.video.includes('v=') ? l.video.split('v=')[1].split('&')[0] : l.video.split('be/')[1];
            document.getElementById('video-frame').innerHTML = `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`;

            const vCont = document.getElementById('victors-list');
            vCont.innerHTML = l.victors.map(v => `<span class="victor-tag">${v}</span>`).join('');

            const btn = document.getElementById('like-btn-action');
            const hasLiked = localStorage.getItem(`user_${currentUser}_liked_${i}`);
            btn.classList.toggle('active', hasLiked === 'true');

            showPage('level-detail');
        }

        document.getElementById('like-btn-action').onclick = function() {
            if(!currentUser) return showPage('auth');
            const hasLiked = localStorage.getItem(`user_${currentUser}_liked_${activeLvlIdx}`);
            let likes = JSON.parse(localStorage.getItem(`likes_${activeLvlIdx}`)) || 0;

            if(hasLiked !== 'true') {
                likes++;
                localStorage.setItem(`user_${currentUser}_liked_${activeLvlIdx}`, 'true');
                this.classList.add('active');
            } else {
                likes--;
                localStorage.removeItem(`user_${currentUser}_liked_${activeLvlIdx}`);
                this.classList.remove('active');
            }

            localStorage.setItem(`likes_${activeLvlIdx}`, likes);
            document.getElementById('det-likes').innerText = likes;
            renderAll();
        };

        function handleAuth() {
            const user = document.getElementById('auth-user').value;
            if(!user) return alert("Введите ник!");
            currentUser = user;
            localStorage.setItem('list_user', user);
            updateHeader();
            showPage('home');
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Авторизация" : "Регистрация";
            document.getElementById('auth-toggle').innerText = isLoginMode ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
        }

        function updateHeader() {
            if(currentUser) {
                document.getElementById('header-auth').innerHTML = `<div class="user-badge" onclick="showProfile()">${currentUser}</div>`;
            }
        }

        function showProfile() {
            document.getElementById('profile-name').innerText = currentUser;
            document.getElementById('user-avatar').innerText = currentUser[0].toUpperCase();
            showPage('profile');
        }

        function logout() {
            localStorage.removeItem('list_user');
            location.reload();
        }

        updateHeader();
        renderAll();
    </script>
</body>
</html>
