<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Demonlist | Paint & Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #08080a;
            --surface-color: #12121a;
            --surface-hover: #1a1a26;
            --accent-color: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --text-main: #ffffff;
            --text-muted: #8e8e9e;
            --border-radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            background-color: rgba(8, 8, 10, 0.8);
            backdrop-filter: blur(15px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky; top: 0; z-index: 1000;
        }

        .logo { 
            font-size: 22px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 2px; 
            transition: var(--transition);
        }
        .logo:hover { color: var(--accent-color); text-shadow: 0 0 15px var(--accent-glow); }

        .nav-btn { 
            background: var(--accent-color); color: white; border: none; 
            padding: 10px 24px; border-radius: 10px; font-weight: 700; 
            cursor: pointer; transition: var(--transition);
        }
        .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px var(--accent-glow); }

        .user-badge { 
            background: rgba(255, 255, 255, 0.05); padding: 8px 18px; 
            border-radius: 10px; cursor: pointer; font-weight: 600; 
            border: 1px solid rgba(255, 255, 255, 0.1); transition: var(--transition);
            display: flex; align-items: center; gap: 12px;
        }
        .user-badge:hover { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }
        .user-badge img { width: 30px; height: 30px; border-radius: 6px; }

        .container { 
            max-width: 900px; margin: 40px auto; padding: 0 20px; 
            animation: fadeIn 0.6s ease-out forwards; 
        }

        .tabs { display: flex; gap: 25px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .tab { 
            cursor: pointer; color: var(--text-muted); font-weight: 700; 
            font-size: 18px; transition: var(--transition); position: relative; 
        }
        .tab.active { color: var(--accent-color); }
        .tab.active::after { 
            content: ''; position: absolute; bottom: -16px; left: 0; 
            width: 100%; height: 3px; background: var(--accent-color); 
        }

        .level-card, .player-card {
            background-color: var(--surface-color); border-radius: var(--border-radius);
            padding: 20px; display: flex; align-items: center; gap: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.03); cursor: pointer;
            transition: var(--transition); margin-bottom: 15px;
            animation: slideIn 0.4s ease-out;
        }
        .level-card:hover, .player-card:hover { 
            transform: translateX(10px) scale(1.02); 
            background-color: var(--surface-hover); 
            border-color: var(--accent-color); 
        }

        .level-img { width: 160px; height: 90px; border-radius: 12px; background-size: cover; background-position: center; background-color: #1c1c28; flex-shrink: 0; }
        
        .victors-box { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 18px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .victor-tag { display: inline-block; background: rgba(59, 130, 246, 0.15); color: var(--accent-color); padding: 6px 14px; border-radius: 20px; font-size: 13px; margin: 5px; font-weight: 700; border: 1px solid rgba(59, 130, 246, 0.3); }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .video-container iframe { width: 100%; height: 100%; border: none; }

        .card {
            background-color: var(--surface-color); padding: 40px; border-radius: 24px;
            width: 100%; max-width: 500px; margin: 60px auto; border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.5s ease-out;
        }

        /* Paint Tools */
        .paint-area { background: #1c1c28; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        #avatar-canvas { 
            background: white; border-radius: 10px; cursor: crosshair; 
            touch-action: none; display: block; margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .paint-controls { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .btn-sm { padding: 5px 12px; font-size: 11px; text-transform: uppercase; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; }

        .input-field { width: 100%; padding: 16px; margin: 10px 0; background: var(--bg-color); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; outline: none; transition: var(--transition); }
        .input-field:focus { border-color: var(--accent-color); }
        
        .action-btn { width: 100%; padding: 16px; background: var(--accent-color); border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; transition: var(--transition); font-size: 16px; }
        .action-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .hidden { display: none !important; }
        .back-link { cursor: pointer; color: var(--text-muted); display: inline-block; margin-bottom: 20px; font-weight: 600; transition: var(--transition); }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="showPage('home')">Real Demonlist</div>
        <div id="header-auth">
            <button class="nav-btn" onclick="showPage('auth')">Войти</button>
        </div>
    </header>

    <!-- Главная -->
    <div id="page-home" class="container">
        <div class="tabs">
            <div class="tab active" id="tab-levels" onclick="switchTab('levels')">Уровни</div>
            <div class="tab" id="tab-players" onclick="switchTab('players')">Топ игроков</div>
        </div>
        <div id="section-levels"><div id="levels-list"></div></div>
        <div id="section-players" class="hidden"><div id="players-list"></div></div>
    </div>

    <!-- Детали уровня -->
    <div id="page-level-detail" class="container hidden">
        <div class="back-link" onclick="showPage('home')">← Назад к списку</div>
        <div class="video-container" id="video-frame"></div>
        <h1 id="det-name" style="font-size: 36px; font-weight: 800; margin-bottom: 5px;"></h1>
        <p id="det-author" style="color: var(--text-muted); font-size: 18px; margin-bottom: 30px;"></p>
        <div class="victors-box">
            <h3 style="margin-bottom:15px;">Victors (Прошедшие):</h3>
            <div id="victors-list"></div>
        </div>
    </div>

    <!-- Авторизация / Регистрация -->
    <div id="page-auth" class="container hidden">
        <div class="card">
            <h2 id="auth-title" style="text-align: center; margin-bottom: 25px;">Авторизация</h2>
            
            <div id="reg-customization" class="hidden">
                <div class="paint-area">
                    <canvas id="avatar-canvas" width="200" height="200"></canvas>
                    <div class="paint-controls">
                        <input type="color" id="brush-color" style="border:none; width:30px; height:30px; background:none; cursor:pointer;">
                        <button class="btn-sm" style="background: #444; color:white;" onclick="setBrushSize(5)">Тонко</button>
                        <button class="btn-sm" style="background: #444; color:white;" onclick="setBrushSize(12)">Толсто</button>
                        <button class="btn-sm" style="background: #ef4444; color:white;" onclick="clearCanvas()">Сброс</button>
                    </div>
                </div>
            </div>

            <input type="text" id="auth-user" class="input-field" placeholder="Никнейм">
            <input type="password" id="auth-pass" class="input-field" placeholder="Пароль">
            <button class="action-btn" onclick="handleAuth()">Продолжить</button>
            <p id="auth-toggle" onclick="toggleAuthMode()" style="text-align: center; margin-top: 20px; cursor: pointer; color: var(--text-muted); font-size: 14px;">Нет аккаунта? Регистрация</p>
        </div>
    </div>

    <!-- Профиль -->
    <div id="page-profile" class="container hidden">
        <div class="card" style="text-align: center;">
            <div id="profile-avatar-container" style="margin-bottom: 20px; display: flex; justify-content: center;"></div>
            <h2 id="profile-name" style="margin-bottom: 30px;">User</h2>
            <button class="action-btn" style="background: #ef4444;" onclick="logout()">Выйти из системы</button>
        </div>
    </div>

    <script>
        // База данных
        const levels = [
            { name: "Silent TarTar", author: "GmdObosralsya", video: "hheiktJXVds", img: "https://i.ytimg.com/vi/hheiktJXVds/maxresdefault.jpg", victors: ["GmdObosralsya","rcelestial"]},
        ];
        const topPlayers = [{ name: "GmdObosralsya", points: 1500 }, { name: "rcelestial", points: 1450 }];

        let currentUser = localStorage.getItem('list_user') || null;
        let isLoginMode = true;

        // Логика рисования
        const canvas = document.getElementById('avatar-canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let brushSize = 8;

        function initPaint() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function start(e) { painting = true; draw(e); }
            function end() { painting = false; ctx.beginPath(); }
            function draw(e) {
                if(!painting) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                
                ctx.lineWidth = brushSize;
                ctx.lineCap = "round";
                ctx.strokeStyle = document.getElementById('brush-color').value;
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            }
            canvas.onmousedown = start; canvas.onmouseup = end; canvas.onmousemove = draw;
            canvas.ontouchstart = start; canvas.ontouchend = end; canvas.ontouchmove = draw;
        }

        function clearCanvas() { ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function setBrushSize(s) { brushSize = s; }

        // Функционал кнопок и переключения страниц
        function showPage(id) {
            document.querySelectorAll('.container').forEach(c => {
                c.classList.add('hidden');
                c.style.animation = 'none'; // Сброс анимации для повторного срабатывания
            });
            const activePage = document.getElementById('page-' + id);
            activePage.classList.remove('hidden');
            activePage.style.animation = 'fadeIn 0.6s ease-out';
        }

        function switchTab(tab) {
            document.getElementById('section-levels').classList.toggle('hidden', tab !== 'levels');
            document.getElementById('section-players').classList.toggle('hidden', tab !== 'players');
            document.getElementById('tab-levels').classList.toggle('active', tab === 'levels');
            document.getElementById('tab-players').classList.toggle('active', tab === 'players');
        }

        function openLevel(i) {
            const l = levels[i];
            document.getElementById('det-name').innerText = l.name;
            document.getElementById('det-author').innerText = 'by ' + l.author;
            document.getElementById('video-frame').innerHTML = `<iframe src="https://www.youtube.com/embed/${l.video}" allowfullscreen></iframe>`;
            document.getElementById('victors-list').innerHTML = l.victors.map(v => `<span class="victor-tag">${v}</span>`).join('');
            showPage('level-detail');
        }

        // Авторизация
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Авторизация" : "Регистрация";
            document.getElementById('reg-customization').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-toggle').innerText = isLoginMode ? "Нет аккаунта? Регистрация" : "Уже есть аккаунт? Войти";
            if(!isLoginMode) setTimeout(initPaint, 100);
        }

        function handleAuth() {
            const user = document.getElementById('auth-user').value;
            if(!user) return alert("Введите никнейм");
            
            currentUser = user;
            localStorage.setItem('list_user', user);
            
            if(!isLoginMode) {
                const imgData = canvas.toDataURL("image/png");
                localStorage.setItem(`avatar_${user}`, imgData);
            }
            
            updateHeader();
            renderPlayers();
            showPage('home');
        }

        function getAvatarImg(user) {
            const data = localStorage.getItem(`avatar_${user}`);
            return data ? `<img src="${data}">` : `<div style="width:30px; height:30px; background:#333; border-radius:6px;"></div>`;
        }

        function updateHeader() {
            if(currentUser) {
                document.getElementById('header-auth').innerHTML = `
                    <div class="user-badge" onclick="showProfile()">
                        ${getAvatarImg(currentUser)}
                        <span>${currentUser}</span>
                    </div>`;
            }
        }

        function renderAll() {
            document.getElementById('levels-list').innerHTML = levels.map((l, i) => `
                <div class="level-card" onclick="openLevel(${i})">
                    <div class="level-img" style="background-image: url('${l.img}')"></div>
                    <div style="flex-grow:1"><div style="font-weight:800; font-size:20px;">${l.name}</div><div style="color:var(--text-muted); font-size:14px;">by ${l.author}</div></div>
                    <div style="font-weight:700; color:var(--accent-color)">${l.victors.length} VICTORS</div>
                </div>`).join('');
            renderPlayers();
        }

        function renderPlayers() {
            document.getElementById('players-list').innerHTML = topPlayers.map((p, i) => `
                <div class="player-card">
                    <div style="font-weight:800; font-size:20px; color:var(--accent-color); width:40px;">#${i+1}</div>
                    <div style="flex-grow:1; display:flex; align-items:center; gap:12px;">${getAvatarImg(p.name)} <b>${p.name}</b></div>
                    <div style="font-weight:800; background:rgba(255,255,255,0.05); padding:8px 15px; border-radius:10px;">${p.points} PTS</div>
                </div>`).join('');
        }

        function showProfile() {
            document.getElementById('profile-name').innerText = currentUser;
            const data = localStorage.getItem(`avatar_${currentUser}`);
            document.getElementById('profile-avatar-container').innerHTML = data ? `<img src="${data}" style="width:160px; height:160px; border-radius:24px; border:4px solid var(--accent-color); box-shadow: 0 0 30px var(--accent-glow);">` : '';
            showPage('profile');
        }

        function logout() { localStorage.removeItem('list_user'); location.reload(); }

        // Старт
        updateHeader();
        renderAll();
    </script>
</body>
</html>
